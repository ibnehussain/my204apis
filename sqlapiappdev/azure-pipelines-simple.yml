# Simple Azure DevOps Pipeline - Build Only
# Focuses on building and creating artifacts for Demo.API and Demo.Web

trigger:
- main
- develop

pool:
  vmImage: 'ubuntu-latest'

variables:
  buildConfiguration: 'Release'
  dotNetVersion: '8.0.x'

steps:
- task: UseDotNet@2
  displayName: 'Install .NET 8 SDK'
  inputs:
    packageType: 'sdk'
    version: $(dotNetVersion)

- task: DotNetCoreCLI@2
  displayName: 'Restore packages'
  inputs:
    command: 'restore'
    projects: '**/*.sln'

- task: DotNetCoreCLI@2
  displayName: 'Build solution (Release)'
  inputs:
    command: 'build'
    projects: '**/*.sln'
    arguments: '--configuration $(buildConfiguration) --no-restore'

- task: DotNetCoreCLI@2
  displayName: 'Publish Demo.API'
  inputs:
    command: 'publish'
    projects: 'Demo.API/Demo.API.csproj'
    arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/api --no-build'
    publishWebProjects: false
    zipAfterPublish: false

- task: DotNetCoreCLI@2
  displayName: 'Publish Demo.Web'
  inputs:
    command: 'publish'
    projects: 'Demo.Web/Demo.Web.csproj'
    arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/web --no-build'
    publishWebProjects: false
    zipAfterPublish: false

- task: PublishPipelineArtifact@1
  displayName: 'Publish Demo.API artifact'
  inputs:
    targetPath: '$(Build.ArtifactStagingDirectory)/api'
    artifact: 'demo-api'

- task: PublishPipelineArtifact@1
  displayName: 'Publish Demo.Web artifact'
  inputs:
    targetPath: '$(Build.ArtifactStagingDirectory)/web'
    artifact: 'demo-web'